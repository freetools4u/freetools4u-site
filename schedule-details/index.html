<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <title>Mission 11th Comeback : Mathematical Tools in One Shot | All Concepts &amp;PYQs Covered</title>
        <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.min.js"></script>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
        <style>
            *,*::before,*::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                -webkit-tap-highlight-color: transparent;
                -webkit-touch-callout: none;
                -webkit-user-select: none;
                user-select: none
            }

            :root {
                --accent: #5a4bda;
                --bg: #000;
                --surface: #111118;
                --surface2: #1c1c27;
                --border: rgba(255,255,255,.1);
                --text: #e8e8f0;
                --muted: #7070a0;
                --note: #3ecfcf;
                --dpp: #ff9f43
            }

            html,body {
                height: 100%;
                width: 100%;
                overflow: hidden;
                background: var(--bg);
                font-family: 'DM Sans',-apple-system,sans-serif;
                color: var(--text)
            }

            #shell {
                position: fixed;
                inset: 0;
                display: flex;
                flex-direction: column;
                background: var(--bg);
                overflow: hidden
            }

            #main-row {
                flex: 1;
                min-height: 0;
                display: flex;
                flex-direction: row;
                overflow: hidden
            }

            #video-col {
                flex: 1;
                min-width: 0;
                min-height: 0;
                position: relative;
                background: #000;
                overflow: hidden
            }

            #vid-box {
                position: absolute;
                inset: 0;
                background: #000;
                display: flex;
                align-items: center;
                justify-content: center
            }

            video {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                object-fit: contain;
                background: #000;
                display: block;
                outline: none;
                pointer-events: none
            }

            .ov {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 10px;
                z-index: 10
            }

            #ovLoad {
                background: rgba(0,0,0,.82)
            }

            #ovLoad.off {
                display: none
            }

            .spinner {
                width: 40px;
                height: 40px;
                border: 3px solid rgba(90,75,218,.18);
                border-top-color: var(--accent);
                border-radius: 50%;
                animation: spin .8s linear infinite
            }

            #ovLoad p {
                font-size: 13px;
                color: rgba(255,255,255,.65)
            }

            #ovErr {
                background: rgba(0,0,0,.88);
                display: none;
                padding: 20px;
                text-align: center
            }

            #ovErr.on {
                display: flex
            }

            #ovErr p {
                font-size: 14px;
                color: #ff6584;
                max-width: 300px;
                line-height: 1.5
            }

            #ovErr button {
                padding: 8px 22px;
                background: var(--accent);
                color: #fff;
                border: none;
                border-radius: 8px;
                font-size: 14px;
                cursor: pointer;
                font-family: inherit;
                margin-top: 4px
            }

            #bufSpin {
                position: absolute;
                inset: 0;
                display: none;
                align-items: center;
                justify-content: center;
                z-index: 8;
                pointer-events: none
            }

            #bufSpin.on {
                display: flex
            }

            #bufSpin::after {
                content: '';
                width: 42px;
                height: 42px;
                border-radius: 50%;
                border: 3px solid rgba(90,75,218,.18);
                border-top-color: var(--accent);
                animation: spin .75s linear infinite
            }

            #ctrl-overlay {
                position: absolute;
                inset: 0;
                z-index: 20;
                display: flex;
                flex-direction: column;
                transition: opacity .35s ease
            }

            #ctrl-overlay.visible {
                opacity: 1;
                pointer-events: auto
            }

            #ctrl-overlay.hidden {
                opacity: 0;
                pointer-events: none
            }

            #tap-shield {
                position: absolute;
                inset: 0;
                z-index: 19;
                background: transparent;
                cursor: pointer;
                display: none
            }

            #tap-shield.on {
                display: block
            }

            #player-header {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 10px 14px;
                background: linear-gradient(rgba(0,0,0,.72) 0%,transparent 100%);
                flex-shrink: 0
            }

            .hdr-back {
                background: none;
                border: none;
                color: #fff;
                cursor: pointer;
                padding: 6px;
                display: flex;
                align-items: center;
                border-radius: 8px;
                flex-shrink: 0;
                transition: transform .12s
            }

            .hdr-back:active {
                transform: scale(.88)
            }

            .hdr-back svg {
                width: 22px;
                height: 22px;
                stroke: #fff;
                fill: none;
                stroke-width: 2;
                stroke-linecap: round;
                stroke-linejoin: round
            }

            #player-title {
                flex: 1;
                min-width: 0;
                font-size: 14px;
                font-weight: 500;
                color: #fff;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis
            }

            #tdBtn {
                background: none;
                border: none;
                color: #fff;
                cursor: pointer;
                padding: 6px;
                display: flex;
                align-items: center;
                border-radius: 8px;
                flex-shrink: 0;
                position: relative
            }

            #tdBtn>svg {
                width: 22px;
                height: 22px;
                fill: #fff
            }

            #tdMenu {
                position: absolute;
                top: calc(100% + 2px);
                right: 0;
                background: rgba(12,12,20,.98);
                border: 1px solid rgba(255,255,255,.12);
                border-radius: 12px;
                overflow: hidden;
                min-width: 190px;
                z-index: 200;
                display: none;
                box-shadow: 0 8px 32px rgba(0,0,0,.9)
            }

            #tdMenu.on {
                display: block
            }

            .tdm-row {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 14px 16px;
                color: #fff;
                font-size: 14px;
                cursor: pointer;
                border-bottom: 1px solid rgba(255,255,255,.07)
            }

            .tdm-row:last-child {
                border-bottom: none
            }

            .tdm-row:active {
                background: rgba(255,255,255,.08)
            }

            .tdm-row svg {
                width: 18px;
                height: 18px;
                flex-shrink: 0;
                stroke: currentColor;
                fill: none
            }

            #ctrl-mid {
                flex: 1
            }

            #player-footer {
                flex-shrink: 0;
                background: linear-gradient(transparent 0%,rgba(0,0,0,.82) 100%);
                padding: 6px 0 10px
            }

            body.yt-mode #player-footer,body.yt-mode #bufSpin,body.yt-mode #ovLoad,body.yt-mode #ovErr {
                display: none!important
            }

            .prog-wrap {
                padding: 0 14px 6px
            }

            .time-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 6px
            }

            .t-left {
                display: flex;
                align-items: center;
                gap: 6px
            }

            .t-time {
                color: #fff;
                font-size: 13px;
                font-family: monospace;
                font-weight: 500
            }

            .spd-badge {
                background: rgba(255,255,255,.92);
                color: #000;
                font-size: 10px;
                font-weight: 800;
                padding: 1px 5px;
                border-radius: 4px;
                font-family: sans-serif
            }

            .live-badge {
                display: none;
                align-items: center;
                gap: 4px;
                font-size: 11px;
                font-weight: 700;
                color: #fff
            }

            .live-badge.on {
                display: flex
            }

            .live-dot {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: red;
                animation: blink 1.4s ease infinite
            }

            .bar-wrap {
                position: relative;
                height: 22px;
                display: flex;
                align-items: center;
                cursor: pointer;
                touch-action: none
            }

            .bar-bg {
                position: absolute;
                left: 0;
                right: 0;
                height: 4px;
                background: rgba(255,255,255,.2);
                border-radius: 2px;
                overflow: hidden
            }

            .bar-buf {
                height: 100%;
                background: rgba(255,255,255,.3);
                position: absolute;
                left: 0;
                border-radius: 2px
            }

            .bar-fill {
                height: 100%;
                background: var(--accent);
                position: absolute;
                left: 0;
                border-radius: 2px
            }

            .bar-thumb {
                position: absolute;
                top: 50%;
                transform: translate(-50%,-50%);
                width: 14px;
                height: 14px;
                background: #fff;
                border-radius: 50%;
                pointer-events: none;
                box-shadow: 0 0 5px rgba(0,0,0,.6);
                will-change: left
            }

            .bar-wrap:hover .bar-thumb {
                transform: translate(-50%,-50%) scale(1.3)
            }

            .bar-input {
                position: absolute;
                inset: 0;
                opacity: 0;
                cursor: pointer;
                width: 100%;
                height: 100%
            }

            .btn-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 6px
            }

            .btn-l,.btn-r {
                display: flex;
                align-items: center
            }

            .cbtn {
                background: none;
                border: none;
                color: #fff;
                cursor: pointer;
                min-width: 44px;
                min-height: 44px;
                padding: 4px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 8px;
                flex-shrink: 0;
                outline: none;
                transition: transform .12s,opacity .12s
            }

            .cbtn:active {
                transform: scale(.85);
                opacity: .65
            }

            .vol-grp {
                display: flex;
                align-items: center
            }

            .vol-range {
                -webkit-appearance: none;
                width: 0;
                height: 4px;
                border-radius: 2px;
                background: rgba(255,255,255,.25);
                outline: none;
                cursor: pointer;
                opacity: 0;
                transition: width .3s,opacity .3s;
                margin-left: 0
            }

            .vol-grp:hover .vol-range,.vol-grp:focus-within .vol-range {
                width: 52px;
                opacity: 1;
                margin-left: 4px
            }

            .vol-range::-webkit-slider-thumb {
                -webkit-appearance: none;
                width: 13px;
                height: 13px;
                border-radius: 50%;
                background: #fff
            }

            .vol-range::-moz-range-thumb {
                width: 13px;
                height: 13px;
                border-radius: 50%;
                background: #fff;
                border: none
            }

            .tl-btn {
                display: none
            }

            .layout-desktop .tl-btn {
                display: flex
            }

            #settBd {
                position: absolute;
                inset: 0;
                z-index: 25;
                display: none
            }

            #settBd.on {
                display: block
            }

            #settPanel {
                position: absolute;
                bottom: 80px;
                right: 8px;
                width: min(260px,calc(100% - 16px));
                z-index: 100;
                display: none;
                isolation: isolate
            }

            #settPanel.on {
                display: block
            }

            .sc {
                background: rgba(10,10,18,.98);
                border-radius: 14px;
                overflow: hidden;
                border: 1px solid rgba(255,255,255,.12);
                box-shadow: 0 4px 32px rgba(0,0,0,.9)
            }

            .s-main {
                display: flex;
                flex-direction: column
            }

            .s-main.off {
                display: none
            }

            .s-sub {
                display: none;
                flex-direction: column
            }

            .s-sub.on {
                display: flex
            }

            .s-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 14px 17px;
                cursor: pointer;
                border-bottom: 1px solid rgba(255,255,255,.07)
            }

            .s-row:last-child {
                border-bottom: none
            }

            .s-row:active {
                background: rgba(255,255,255,.05)
            }

            .s-lbl {
                color: #fff;
                font-size: 15px;
                font-weight: 500
            }

            .s-val {
                display: flex;
                align-items: center;
                gap: 4px;
                color: rgba(255,255,255,.42);
                font-size: 14px
            }

            .s-back {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 12px 17px;
                border-bottom: 1px solid rgba(255,255,255,.08);
                cursor: pointer
            }

            .s-back span {
                color: #fff;
                font-size: 15px;
                font-weight: 700
            }

            .s-scroll {
                overflow-y: auto;
                max-height: 220px
            }

            .sopt {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 13px 17px;
                cursor: pointer;
                border-bottom: 1px solid rgba(255,255,255,.06)
            }

            .sopt:last-child {
                border-bottom: none
            }

            .sopt.active {
                background: rgba(90,75,218,.2)
            }

            .sopt span {
                color: #fff;
                font-size: 14px
            }

            .radio {
                width: 18px;
                height: 18px;
                border-radius: 50%;
                border: 2px solid rgba(255,255,255,.3);
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0
            }

            .sopt.active .radio {
                border-color: var(--accent);
                background: var(--accent)
            }

            .rdot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: #fff;
                display: none
            }

            .sopt.active .rdot {
                display: block
            }

            @keyframes sk-l {
                0%,100% {
                    transform: rotate(0)
                }

                50% {
                    transform: rotate(-35deg)
                }
            }

            @keyframes sk-r {
                0%,100% {
                    transform: rotate(0)
                }

                50% {
                    transform: rotate(35deg)
                }
            }

            .anim-l svg {
                animation: sk-l .32s ease
            }

            .anim-r svg {
                animation: sk-r .32s ease
            }

            #side-panel {
                width: 0;
                overflow: hidden;
                flex-shrink: 0;
                background: var(--surface);
                border-left: 1px solid var(--border);
                display: none;
                flex-direction: column;
                transition: width .3s cubic-bezier(.4,0,.2,1)
            }

            #side-panel.open {
                width: 340px
            }

            #bottom-panel {
                flex-shrink: 0;
                background: var(--surface);
                border-top: 1px solid var(--border);
                display: none;
                flex-direction: column;
                height: 0;
                overflow: hidden;
                transition: height .35s cubic-bezier(.4,0,.2,1)
            }

            #bottom-panel.open {
                height: 50vh
            }

            #shell.layout-desktop #side-panel {
                display: flex
            }

            #shell.layout-desktop #bottom-panel {
                display: none!important
            }

            #shell.layout-desktop #main-row {
                flex: 1
            }

            #shell.layout-mobile #bottom-panel {
                display: flex
            }

            #shell.layout-mobile #side-panel {
                display: none!important
            }

            .panel-inner {
                display: flex;
                flex-direction: column;
                height: 100%;
                min-height: 0
            }

            .panel-hdr {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 12px 16px;
                border-bottom: 1px solid var(--border);
                flex-shrink: 0
            }

            .panel-hdr-title {
                font-size: 16px;
                font-weight: 700;
                color: var(--text)
            }

            .panel-close {
                background: none;
                border: none;
                cursor: pointer;
                color: var(--muted);
                padding: 4px;
                display: flex;
                align-items: center;
                border-radius: 6px
            }

            .panel-close svg {
                width: 20px;
                height: 20px;
                stroke: currentColor;
                fill: none;
                stroke-width: 2.5
            }

            .panel-tabs {
                display: flex;
                border-bottom: 1px solid var(--border);
                flex-shrink: 0
            }

            .ptab {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 5px;
                padding: 10px 6px;
                font-size: 13px;
                font-weight: 600;
                color: var(--muted);
                cursor: pointer;
                border: none;
                background: transparent;
                border-bottom: 2px solid transparent;
                transition: color .15s,border-color .15s;
                white-space: nowrap
            }

            .ptab svg {
                width: 14px;
                height: 14px;
                flex-shrink: 0
            }

            .ptab.active {
                color: #fff;
                border-bottom-color: var(--accent)
            }

            .panel-body {
                flex: 1;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                overscroll-behavior: contain;
                scrollbar-width: thin;
                scrollbar-color: rgba(255,255,255,.12) transparent
            }

            .panel-body::-webkit-scrollbar {
                width: 3px
            }

            .panel-body::-webkit-scrollbar-thumb {
                background: rgba(255,255,255,.12);
                border-radius: 2px
            }

            .ptab-panel {
                display: none;
                padding: 12px
            }

            .ptab-panel.active {
                display: block
            }

            .tl-list {
                display: flex;
                flex-direction: column;
                gap: 10px
            }

            .tl-card {
                position: relative;
                border-radius: 10px;
                overflow: hidden;
                cursor: pointer;
                border: 2px solid transparent;
                transition: border-color .15s;
                background: #000
            }

            .tl-card:hover {
                border-color: rgba(90,75,218,.5)
            }

            .tl-card.cur {
                border-color: var(--accent)
            }

            .tl-img {
                width: 100%;
                aspect-ratio: 16/9;
                object-fit: cover;
                display: block;
                background: #1c1c27
            }

            .tl-ov {
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                background: linear-gradient(transparent,rgba(0,0,0,.9));
                padding: 20px 10px 8px;
                display: flex;
                align-items: flex-end;
                justify-content: space-between;
                gap: 6px
            }

            .tl-name {
                font-size: 12px;
                font-weight: 700;
                color: #fff;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                flex: 1;
                min-width: 0
            }

            .tl-ts {
                background: rgba(0,0,0,.5);
                color: #fff;
                font-family: monospace;
                font-size: 10px;
                padding: 2px 5px;
                border-radius: 4px;
                white-space: nowrap;
                flex-shrink: 0
            }

            .tl-cur-badge {
                position: absolute;
                top: 6px;
                left: 6px;
                background: var(--accent);
                color: #fff;
                font-size: 9px;
                font-weight: 700;
                padding: 2px 7px;
                border-radius: 20px;
                display: none;
                letter-spacing: .3px
            }

            .tl-card.cur .tl-cur-badge {
                display: block
            }

                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: 10px;
                overflow: hidden;
                margin-bottom: 10px
            }

            .acc-hdr {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 12px 14px;
                cursor: pointer;
                gap: 8px
            }

            .acc-hdr:active {
                background: rgba(255,255,255,.04)
            }

            .acc-hl {
                display: flex;
                align-items: center;
                gap: 8px
            }

            .acc-ic {
                width: 24px;
                height: 24px;
                border-radius: 6px;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0
            }

            .acc-ic svg {
                width: 12px;
                height: 12px
            }

            .ni {
                background: rgba(62,207,207,.15)
            }

            .ni svg {
                fill: var(--note)
            }

            .di {
                background: rgba(255,159,67,.15)

            }

            .dt {
                color: var(--dpp)
            }

            .acc-cnt {
                font-size: 10px;
                padding: 1px 6px;
                border-radius: 20px
            }

            .nc {
                background: rgba(62,207,207,.12);

            }

            .dc {
                background: rgba(255,159,67,.12);
                color: var(--dpp)
            }

            .acc-chev {

                max-height: 0;
                overflow: hidden;
                transition: max-height .3s cubic-bezier(.4,0,.2,1)
            }

            .acc.open .acc-body {
                max-height: 2000px
            }

            .acc-inner {
                border-top: 1px solid var(--border)
            }

                display: flex;
                align-items: center;
                gap: 10px;
                padding: 12px 14px;
                border-bottom: 1px solid rgba(255,255,255,.05)
            }

            .att-item:last-child {
                border-bottom: none
            }

            .att-dot {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                flex-shrink: 0
            }

            .nd {
                background: var(--note)
            }

            .dd {
                background: var(--dpp)
            }

            .att-name {
                flex: 1;
                font-size: 13px;
                color: var(--text);
                line-height: 1.4;
                word-break: break-word;
                min-width: 0
            }

            .att-actions {
                display: flex;
                align-items: center;
                gap: 5px;
                flex-shrink: 0
            }

                width: 32px;
                height: 32px;
                border-radius: 7px;
                border: 1px solid rgba(255,255,255,.12);
                background: rgba(255,255,255,.06);
                color: rgba(255,255,255,.75);
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background .12s,border-color .12s,color .12s;
                flex-shrink: 0
            }

            .att-btn:active {
                background: var(--accent);
                border-color: var(--accent);
                color: #fff
            }

            .att-btn svg {
                width: 15px;
                height: 15px;
                stroke: currentColor;
                fill: none;
                stroke-width: 1.8;
                stroke-linecap: round;
                stroke-linejoin: round;
                pointer-events: none
            }

            .att-btn.preview:hover {
                background: rgba(62,207,207,.15);
                border-color: var(--note);
                color: var(--note)
            }

            .att-btn.open-tab:hover {
                background: rgba(90,75,218,.18);
                border-color: var(--accent);
                color: #a89dff
            }

            .att-btn.download:hover {
                background: rgba(255,159,67,.15);
                border-color: var(--dpp);
                color: var(--dpp)
            }

            .pdf-preview-wrap {
                display: flex;
                flex-direction: column;
                height: 100%
            }

            .pdf-preview-topbar {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 10px 14px;
                border-bottom: 1px solid var(--border);
                flex-shrink: 0
            }

            .pdf-back-btn {
                background: none;
                border: none;
                cursor: pointer;
                padding: 4px;
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 13px;
                font-weight: 600;
                color: #fff;
                border-radius: 6px
            }

            .pdf-back-btn svg {
                width: 16px;
                height: 16px;
                stroke: currentColor;
                fill: none;
                stroke-width: 2.5
            }

            .pdf-preview-title {
                flex: 1;
                min-width: 0;
                font-size: 13px;
                font-weight: 600;
                color: var(--text);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis
            }

            .pdf-frame-container {
                flex: 1;
                overflow: auto;
                background: #1a1a28;
                -webkit-overflow-scrolling: touch
            }

            .pdf-canvas-wrap {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 6px;
                padding: 8px
            }

            .pdf-page-canvas {
                display: block;
                box-shadow: 0 2px 12px rgba(0,0,0,.5)
            }

            .pdf-loading,.pdf-err {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 200px;
                gap: 12px;
                padding: 20px;
                text-align: center
            }

            .pdf-loading .spinner {
                border-top-color: var(--note)
            }

            .pdf-loading p,.pdf-err p {
                font-size: 13px;
                color: var(--muted);
                line-height: 1.5
            }

            .pdf-err a {
                color: var(--note);
                font-size: 13px;
                font-weight: 600;
                text-decoration: none
            }

            .no-items {
                text-align: center;
                padding: 36px 16px;
                color: var(--muted);
                font-size: 14px
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg)
                }
            }

            @keyframes blink {
                0%,50% {
                    opacity: 1
                }

                51%,100% {
                    opacity: .2
                }
            }
        </style>
    </head>

                const fc = pi.querySelector('#pdfFrameContainer');
                fc.innerHTML = '<div class="pdf-loading"><div class="spinner"></div><p>Loading PDF…</p></div>';
                function render() {
                    const lib = window['pdfjs-dist/build/pdf'];
                    lib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                    lib.getDocument({
                        url,
                        cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',
                        cMapPacked: true
                    }).promise.then(doc => {
                        fc.innerHTML = '';
                        const wrap = document.createElement('div');
                        wrap.className = 'pdf-canvas-wrap';
                        fc.appendChild(wrap);
                        const dpr = window.devicePixelRatio || 1
                          , w = fc.clientWidth || 360;
                        function rp(n) {
                            if (n > doc.numPages)
                                return;
                            doc.getPage(n).then(page => {
                                const vp = page.getViewport({
                                    scale: (w - 16) / page.getViewport({
                                        scale: 1
                                    }).width * dpr
                                });
                                const c = document.createElement('canvas');
                                c.className = 'pdf-page-canvas';
                                c.width = vp.width;
                                c.height = vp.height;
                                c.style.width = (vp.width / dpr) + 'px';
                                c.style.height = (vp.height / dpr) + 'px';
                                wrap.appendChild(c);
                                page.render({
                                    canvasContext: c.getContext('2d'),
                                    viewport: vp
                                }).promise.then( () => rp(n + 1));
                            }
                            );
                        }
                        rp(1);
                    }
                    ).catch( () => {
                        fc.innerHTML = `<div class="pdf-err"><p>Could not load PDF.</p><a href="${url}" target="_blank" rel="noopener">Open PDF ↗</a></div>`;
                    }
                    );

                    return;

                s.onerror = () => {
                    fc.innerHTML = `<div class="pdf-err"><p>PDF viewer failed.</p><a href="${url}" target="_blank" rel="noopener">Open PDF ↗</a></div>`;
                }
                ;
                document.head.appendChild(s);

                function sigParams(url) {
                    try {
                        const u = new URL(url)

                        u.searchParams.forEach( (v, k) => {

                        return u.toString();

                        return target;

                function parseKeys(keys) {
                    const norm = s => String(s).replace(/-/g, '').toLowerCase().trim();
                    const o = {};
                    if (!keys)
                        return o;
                    const add = (k, v) => {
                        k = norm(k);
                        v = norm(v);
                        if (k && v)
                            o[k] = v;
                    }
                    ;
                    if (typeof keys === 'object' && !Array.isArray(keys))
                        Object.entries(keys).forEach( ([k,v]) => add(k, v));
                    else {
                        const lines = Array.isArray(keys) ? keys : String(keys).split(/[\n,]+/);
                        lines.forEach(s => {
                            s = String(s).trim();
                            if (!s)
                                return;
                            const i = s.indexOf(':');
                            if (i > 0)
                                add(s.slice(0, i), s.slice(i + 1));
                        }
                        );
                    }
                    return o;
                }

                    }

                    try {
                        const x = new URL(u);
                        if (x.hostname.includes('youtu.be'))
                            return x.pathname.slice(1).split('?')[0];
                        if (x.pathname.includes('/embed/'))
                            return x.pathname.split('/embed/')[1].split(/[?/]/)[0];

                            fragLoadingMaxRetry: 6,
                            fragLoadingRetryDelay: 1000,
                            xhrSetup(xhr, reqUrl) {
                                xhr.open('GET', appendSig(reqUrl, sig), true);
                                xhr.timeout = 20000;
                                if (reqUrl.includes('.key') || reqUrl.includes('enc.key') || reqUrl.includes('get-hls-key'))
                                    Object.entries(PW_HEADERS || {}).forEach( ([k,v]) => {
                                        try {
                                            xhr.setRequestHeader(k, v);
                                        } catch {}
                                    }
                                    );
                            }
                        });
                        hlsInst.on(Hls.Events.MANIFEST_PARSED, (_, d) => {
                            if (d.levels?.some(l => l.details?.live))
                                markLive();
                            const seen = new Set();
                            const levels = d.levels.map( (l, i) => ({
                                label: (l.height || parseInt(l.attrs?.RESOLUTION?.split('x')[1]) || 0) + 'p',
                                value: i,
                                height: l.height || parseInt(l.attrs?.RESOLUTION?.split('x')[1]) || 0
                            })).filter(l => {
                                if (!l.height || seen.has(l.height))
                                    return false;
                                seen.add(l.height);
                                return true;
                            }
                            ).sort( (a, b) => b.height - a.height);
                            if (levels.length)
                                buildQual(levels);
                            tryStart();
                        }
                        );
                        hlsInst.on(Hls.Events.LEVEL_LOADED, (_, d) => {
                            if (d.details?.live)
                                markLive();
                        }
                        );
                        hlsInst.on(Hls.Events.ERROR, (_, d) => {
                            if (!d.fatal)
                                return;
                            if (d.type === Hls.ErrorTypes.NETWORK_ERROR) {
                                netErr++;
                                if (netErr <= 5)
                                    setTimeout( () => hlsInst && hlsInst.startLoad(), netErr * 1000);
                                else
                                    showError('Network error — check connection and retry.');
                            } else if (d.type === Hls.ErrorTypes.MEDIA_ERROR)
                                hlsInst.recoverMediaError();
                            else
                                showError('HLS playback failed.');
                        }
                        );
                        vid.addEventListener('canplay', tryStart);
                        vid.addEventListener('canplaythrough', tryStart);
                        vid.addEventListener('playing', () => {
                            netErr = 0;
                        }
                        );
                        hlsInst.loadSource(url);
                        hlsInst.attachMedia(vid);
                        return;
                    }

                    if (!vid.canPlayType('application/vnd.apple.mpegurl')) {
                        showError('HLS not supported in this browser.');
                        return;
                    }

                    /* iOS/Safari native — check for FairPlay DRM */
                    if (data && data.licenseUrl && data.licenseToken) {
                        initFairPlay(url, data);
                        return;
                    }

                    let done = false
                      , t = null;
                    function go() {
                        if (done)
                            return;
                        done = true;
                        clearTimeout(t);
                        if (!isFinite(vid.duration) || vid.duration === 0)
                            markLive();
                        startVideo();
                    }
                    vid.addEventListener('loadedmetadata', go, {
                        once: true
                    });
                    vid.addEventListener('canplay', go, {
                        once: true
                    });
                    vid.addEventListener('canplaythrough', go, {
                        once: true
                    });
                    vid.addEventListener('error', () => {
                        if (done)
                            return;
                        clearTimeout(t);
                        showError(vid.error?.message || 'HLS failed.');
                    }
                    );
                    t = setTimeout( () => {
                        if (!done)
                            showError('Stream timeout. Check connection.');
                    }
                    , 20000);
                    vid.src = url;
                    vid.load();
                }

                /* ── FairPlay DRM (iOS Safari) ──
   Flow: fetch certificate (no auth headers) → set src → browser fires webkitneedkey →
   create session → receive keymessage with SPC data → POST spc + pallycon token to licenseUrl →
   receive CKC → session.update(ckc)
── */
                function initFairPlay(url, data) {
                    const KEY_SYSTEM = 'com.apple.fps.1_0';

                    if (!window.WebKitMediaKeys) {
                        showError('FairPlay DRM not supported in this browser.');
                        return;
                    }
                    if (!data.certificateUrl) {
                        showError('FairPlay certificate URL missing.');
                        return;
                    }

                    let started = false
                      , done = false
                      , errTimer = null
                      , needKeyTimer = null
                      , session = null;

                    function tryStart() {
                        if (started)
                            return;
                        started = true;
                        startVideo();
                    }
                    function go() {
                        if (done)
                            return;
                        done = true;
                        clearTimeout(errTimer);
                        clearTimeout(needKeyTimer);
                        if (!isFinite(vid.duration) || vid.duration === 0)
                            markLive();
                        tryStart();
                    }

                    function extractContentId(initData) {
                        try {
                            const bytes = new Uint8Array(initData instanceof ArrayBuffer ? initData : initData.buffer);
                            const str = String.fromCharCode.apply(null, bytes);
                            const skd = str.match(/skd:\/\/[^\x00]*/)?.[0] || str;
                            return skd.replace('skd://', '').split('?')[0];
                        } catch {
                            return '';
                        }
                    }

                    function onNeedKey(event) {
                        clearTimeout(needKeyTimer);
                        if (!vid.webkitKeys) {
                            showError('FairPlay media keys not ready.');
                            return;
                        }
                        const initData = event.initData;
                        try {
                            session = vid.webkitKeys.createSession('video/mp4', initData);
                        } catch (err) {
                            showError('FairPlay session failed: ' + err.message);
                            return;
                        }
                        session.contentId = extractContentId(initData);

                        session.addEventListener('webkitkeymessage', e => {
                            /* e.message is the SPC (Server Playback Context) binary data */
                            const spcBody = new Uint8Array(e.message.buffer || e.message);
                            const headers = Object.assign({}, PW_HEADERS || {}, {
                                'pallycon-customdata-v2': data.licenseToken,
                                'content-type': 'application/octet-stream'
                            });
                            fetch(data.licenseUrl, {
                                method: 'POST',
                                headers,
                                body: spcBody
                            }).then(r => {
                                if (!r.ok)
                                    throw new Error('License request failed: ' + r.status);
                                return r.arrayBuffer();
                            }
                            ).then(ckc => {
                                session.update(new Uint8Array(ckc));
                            }
                            ).catch(err => showError('FairPlay license error: ' + err.message));
                        }
                        );
                        session.addEventListener('webkitkeyadded', () => go());
                        session.addEventListener('webkitkeyerror', () => showError('FairPlay key error. Please retry.'));
                    }

                    vid.addEventListener('webkitneedkey', onNeedKey);
                    vid.addEventListener('error', () => {
                        if (done)
                            return;
                        clearTimeout(errTimer);
                        clearTimeout(needKeyTimer);
                        showError(vid.error?.message || 'FairPlay playback failed.');
                    }
                    );

                    errTimer = setTimeout( () => {
                        if (!done)
                            showError('Stream timeout. Check connection.');
                    }
                    , 25000);

                    /* Fetch certificate WITHOUT auth headers (PallyCon CDN requires no auth for certificate) */
                    showLoading('Loading Stream…');
                    fetch(data.certificateUrl).then(r => {
                        if (!r.ok)
                            throw new Error('Certificate fetch failed: ' + r.status);
                        return r.arrayBuffer();
                    }
                    ).then(certBuf => {
                        const mk = new WebKitMediaKeys(KEY_SYSTEM);
                        vid.webkitSetMediaKeys(mk);
                        vid._fpCert = new Uint8Array(certBuf);
                        needKeyTimer = setTimeout( () => {
                            if (!done)
                                showError('FairPlay did not initialize. Please retry.');
                        }
                        , 8000);
                        vid.src = url;
                        vid.load();
                    }
                    ).catch(err => showError('FairPlay setup failed: ' + err.message));
                }

                /* ── DASH (Shaka) ── */
                async function initDASH(data) {
                    if (!shaka.Player.isBrowserSupported())
                        throw new Error('DASH not supported in this browser.');
                    showLoading('Loading Stream…');
                    shaka.polyfill.installAll();
                    if (shakaInst) {
                        try {
                            await shakaInst.destroy();
                        } catch {}
                        shakaInst = null;
                    }
                    shakaInst = new shaka.Player();
                    await shakaInst.attach(vid);

                    shakaInst.configure({
                        streaming: {
                            bufferingGoal: 30,
                            rebufferingGoal: 2,
                            bufferBehind: 30,
                            retryParameters: {
                                maxAttempts: 5,
                                baseDelay: 1000,
                                backoffFactor: 2,
                                fuzzFactor: 0.5
                            }
                        },
                        abr: {
                            enabled: true,
                            defaultBandwidthEstimate: 500000,
                            switchInterval: 8,
                            bandwidthUpgradeTarget: 0.75,
                            bandwidthDowngradeTarget: 0.95
                        }
                    });

                    shakaInst.addEventListener('error', e => {
                        if (e.detail?.severity === shaka.util.Error.Severity.RECOVERABLE)
                            shakaInst.retryStreaming().catch( () => {}
                            );
                    }
                    );

                    if (data.keys) {
                        const ck = parseKeys(data.keys);
                        if (Object.keys(ck).length)
                            shakaInst.configure({
                                drm: {
                                    clearKeys: ck
                                }
                            });
                    } else if (data.licenseUrl && data.licenseToken) {
                        shakaInst.configure({
                            drm: {
                                servers: {
                                    'com.widevine.alpha': data.licenseUrl
                                }
                            }
                        });
                        shakaInst.getNetworkingEngine().registerRequestFilter( (type, req) => {
                            if (type === shaka.net.NetworkingEngine.RequestType.LICENSE) {
                                Object.entries(PW_HEADERS || {}).forEach( ([k,v]) => {
                                    req.headers[k] = v;
                                }
                                );
                                req.headers['pallycon-customdata-v2'] = data.licenseToken;
                                req.headers['content-type'] = 'application/octet-stream';
                            }
                        }
                        );
                    }

                    const sig = sigParams(data.url);
                    if (sig) {
                        shakaInst.getNetworkingEngine().registerRequestFilter( (type, req) => {
                            const T = shaka.net.NetworkingEngine.RequestType;
                            if (type === T.SEGMENT || type === T.MANIFEST)
                                req.uris = req.uris.map(u => appendSig(u, sig));
                        }
                        );
                    }

                    await shakaInst.load(data.url);
                    if (shakaInst.isLive())
                        markLive();

                    try {
                        const seen = new Set();
                        const levels = shakaInst.getVariantTracks().filter(t => {
                            if (!t.height || seen.has(t.height))
                                return false;
                            seen.add(t.height);
                            return true;
                        }
                        ).sort( (a, b) => b.height - a.height).map(t => ({
                            label: t.height + 'p',
                            value: t.id
                        }));
                        if (levels.length)
                            buildQual(levels);
                    } catch {}

                    let done = false;
                    vid.addEventListener('canplay', () => {
                        if (done)
                            return;
                        done = true;
                        startVideo();
                    }
                    , {
                        once: true
                    });
                    if (vid.readyState >= 3) {
                        done = true;
                        startVideo();
                    }
                }

                /* ── Master init ── */
                async function initPlayer(data) {
                    if (initialized) {
                        destroyPlayers();
                        initialized = false;
                    }
                    initialized = true;
                    lastData = data;
                    showLoading('Initializing…');
                    try {
                        if (isNativeOnly) {
                            if (isYT(data.url)) {
                                initYT(data.url);
                                return;
                            }
                            const lo = data.url.toLowerCase().split('?')[0];
                            initHLS((lo.endsWith('.m3u8') || lo.includes('m3u8')) ? data.url : toHLS(data.url), data);
                            return;
                        }
                        const type = detectType(data.url);
                        if (type === 'youtube')
                            initYT(data.url);
                        else if (type === 'hls')
                            initHLS(data.url, data);
                        else if (type === 'progressive')
                            initProgressive(data.url);
                        else {
                            try {
                                await initDASH(data);
                            } catch {
                                if (shakaInst) {
                                    try {
                                        await shakaInst.destroy();
                                    } catch {}
                                    shakaInst = null;
                                }
                                vid.removeAttribute('src');
                                vid.load();
                                initHLS(toHLS(data.url), data);
                            }
                        }
                    } catch (err) {
                        initialized = false;
                        showError(err.message || 'Failed to load video.');
                    }
                }

                /* ── Boot: fetch video URL then play ── */
                async function boot() {
                    showLoading('Loading…');
                    try {
                        if (!MEDIA_TOKEN)
                            throw new Error('Media token not available.');
                        const container = isNativeOnly ? 'HLS' : 'DASH';
                        const res = await fetch('freetools4u-site/v1/videos/video-url-details?' + new URLSearchParams({
                            mediaToken: MEDIA_TOKEN,
                            videoContainerType: container
                        }));
                        if (!res.ok)
                            throw new Error('Failed to resolve video (' + res.status + ').');
                        const json = await res.json();
                        if (!json.success || !json.data?.url)
                            throw new Error(json.message || 'Video not available.');
                        const data = json.data;
                        if (isYT(data.url))
                            document.body.classList.add('yt-mode');
                        await initPlayer(data);
                    } catch (err) {
                        showError(err.message || 'Video not available.');
                    }
                }

                retryBtn.addEventListener('click', () => boot());
                window.addEventListener('beforeunload', () => {
                    if (shakaInst) {
                        try {
                            shakaInst.destroy();
                        } catch {}
                    }
                    if (hlsInst)
                        hlsInst.destroy();
                }
                );

                showLoading('Loading…');
                showControls();
                scheduleHide();
                boot();

            }
            )();
        </script>
